<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spell of the Day</title>

    <!-- All styles live in style.css — no inline styles anywhere in this file -->
    <link rel="stylesheet" href="style.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header>
        <h1 class="main-title">Spell of the Day</h1>
        <p class="subtitle">Your daily dose of magic</p>
    </header>

    <!-- ===== MAIN CONTENT ===== -->
    <main>

        <!-- Spell Display Card -->
        <article class="spell-card" id="spellCard">

            <header class="spell-header">
                <h2 class="spell-name" id="spellName">Loading...</h2>
            </header>

            <div class="spell-content">
                <section class="spell-section">
                    <h3>Description</h3>
                    <div class="spell-description" id="spellDescription"></div>
                </section>
            </div>

            <!--CRUD Action Buttons , app.js adds the .visible class once a spell loads,
                and removes it again after a delete.-->
            <div class="spell-actions" id="spellActions">
                
                <!-- UPDATE: toggles liked true/false — PUT /api/spells/:index/like -->
                <button class="like-btn" id="likeBtn">Like Spell</button>

                <!-- DELETE: removes spell from DB — DELETE /api/spells/:index -->
                <button class="delete-btn" id="deleteBtn">🗑 Delete Spell</button>
            </div>

        </article>

        <!-- Loading Indicator — .active class added/removed by app.js -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Consulting the spellbook...</p>
        </div>

        <!--Error Message-->
        <div class="error-message" id="errorMessage">
            <p>The magic is fickle...</p>
            <button class="retry-btn" id="retryBtn">Try Again</button>
        </div>

        <!-- Refresh Button -->
        <div class="action-section">
            <button class="refresh-btn" id="refreshBtn">Refresh Spell</button>
            <p class="refresh-note">New spell at midnight!</p>
        </div>

    </main>

    <!-- ===== FOOTER ===== -->
    <footer>
        <p>Powered by the D&amp;D 5e API</p>
    </footer>

    <!-- JavaScript — loaded last so the DOM is ready when the script runs -->
    <script src="app.js"></script>

</body>
</html>
